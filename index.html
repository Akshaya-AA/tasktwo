<!DOCTYPE html>

    <title>My Will</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 bg-dark text-white p-4 sidebar text-center">
                <div class="text-center">
                    <img src="images/review3.jpeg" alt="Profile" class="rounded-circle mb-3" style="width: 150px; height: 150px; object-fit: cover;">
                </div>
                
                <h6>D.O.C: 28.04.2023</h6>
                <h6>Status: <span class="text-white">Complete</span></h6>
                <button class="button btn-light text-decoration-underline btn-sm mt-3">Back Home</button>
            </div>  
            
            <div class="col-md-9 p-4">
                <div class="mb-3">
                    <button class="btn btn-primary">ADD Beneficiaries</button>
                    <button class="btn btn-primary">ADD Asset</button>
                    <button class="btn btn-primary">ADD Liability</button>
                    <button class="btn btn-primary">CREATE Links</button>
                    <button class="btn btn-primary">ADD Signatures</button>
                    <button class="btn btn-primary">Will Generation</button>
                </div>
                
                <!-- Table -->
                <div class="table-responsive">
                    <table class="table table-striped table-bordered">
                        <thead>
                            <tr>
                                <th>S. No</th>
                                <th>Name</th>
                                <th>Relationship</th>
                                <th>Date of Birth</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Akshaya</td>
                                <td>Sister</td>
                                <td>2002-03-06</td>
                                <td class="text-success">Active</td>
                                <td>
                                    <button class="button btn-sm btn-secondary">Edit</button>
                                    <button class="button btn-sm btn-danger">Delete</button>
                                </td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>Mohanapriya</td>
                                <td>Sister</td>
                                <td>1988-10-04</td>
                                <td class="text-danger">Inactive</td>
                                <td>
                                    <button class="button btn-sm btn-secondary">Edit</button>
                                    <button class="button btn-sm btn-danger">Delete</button>
                                </td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td>Aswini</td>
                                <td>Sister</td>
                                <td>2005-07-14</td>
                                <td class="text-success">Active</td>
                                <td>
                                    <button class="button btn-sm btn-secondary">Edit</button>
                                    <button class="button btn-sm btn-danger">Delete</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!--Form -->
                <div class="container mt-4 form-container">
                    <h5>Add New Beneficiary</h5>
                    <form>
                        <div class="mb-3">
                            <label for="sno" class="form-label">S.No</label>
                            <input type="number" id="sno" class="form-control" placeholder="serial number" required>
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">First Name</label>
                            <input type="text" id="name" class="form-control" placeholder="enter name" required>
                        </div>
                        <div class="mb-3">
                            <label for="relationship" class="form-label">Relationship</label>
                            <input type="text" id="relationship" class="form-control" placeholder="enter relationship" required>
                        </div>
                        <div class="mb-3">
                            <label for="dob" class="form-label">Date of Birth</label>
                            <input type="date" id="dob" class="form-control" required>
                        </div>
                        <button type="submit" class="btn w-100">Add Beneficiary</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
